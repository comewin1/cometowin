.overlay{

/* TITLE ANIMATION */

.title{
font-size:40px;
font-weight:bold;

@keyframes rainbow{
0%{color:#ff0000}
20%{color:#ff8c00}
40%{color:#ffff00}
60%{color:#00ff00}
80%{color:#00ffff}
100%{color:#ff00ff}

.subtitle{

font-size:22px;
text-shadow:0 0 10px #00ffe7,0 0 20px #00ffe7;
}

/* FIRST TEXT COLOR */

.color1{
background:linear-gradient(90deg,#00ffff,#00ff99,#00ffff);

}

/* SECOND TEXT COLOR */

/* BUTTON */

.button{

margin:25px;
padding:15px 30px;
background:linear-gradient(45deg,#ff0066,#ffcc00,#00ffcc);
border-radius:12px;
font-size:18px;
text-decoration:none;
color:white;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.07)}
100%{transform:scale(1)}
}

/* TIMER */

.timer{
width:120px;
height:120px;
border-radius:50%;
border:5px solid cyan;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
margin:20px auto;
box-shadow:0 0 25px purple;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px purple}
to{box-shadow:0 0 40px cyan}
}

/* IMAGES */

.images img{
width:90%;
max-width:400px;
margin:10px;
border-radius:10px;
transition:0.4s;
}

.images img:hover{
transform:scale(1.05);
}
